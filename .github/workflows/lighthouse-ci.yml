name: Lighthouse CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./sunday-brunch-website

    steps:
      - name: Checkout code
        # actions/checkout@v6.0.3
        uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0

      - name: Setup Node.js
        # actions/setup-node@v6.4.0
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: sunday-brunch-website/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        run: npm run build
        env:
          NODE_ENV: production

      - name: Run Lighthouse CI
        run: |
          npm install -g @lhci/cli@0.15.x --no-audit --no-fund --loglevel=error
          lhci autorun
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

      - name: Check for Lighthouse result files
        id: lighthouse_results
        if: always()
        run: |
          if [ -d .lighthouseci ] && [ -n "$(find .lighthouseci -type f -print -quit)" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload Lighthouse results
        # actions/upload-artifact@v7.0.1
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        if: always() && steps.lighthouse_results.outputs.available == 'true'
        with:
          name: lighthouse-results
          path: sunday-brunch-website/.lighthouseci
          include-hidden-files: true

      - name: Comment PR with Lighthouse results
        if: github.event_name == 'pull_request'
        # actions/github-script@v9.0.0
        uses: actions/github-script@d746ffe35508b1917358783b479e04febd2b8f71
        with:
          script: |
            const fs = require('fs');
            const resultsPath = 'sunday-brunch-website/.lighthouseci/manifest.json';

            if (fs.existsSync(resultsPath)) {
              const results = JSON.parse(fs.readFileSync(resultsPath, 'utf8'));
              const summary = results[0]?.summary || {};

              const comment = `## 🔍 Lighthouse CI Results

              | Category | Score |
              |----------|-------|
              | ⚡ Performance | ${Math.round((summary.performance || 0) * 100)}% |
              | ♿ Accessibility | ${Math.round((summary.accessibility || 0) * 100)}% |
              | 🔒 Best Practices | ${Math.round((summary['best-practices'] || 0) * 100)}% |
              | 🔎 SEO | ${Math.round((summary.seo || 0) * 100)}% |

              [View full report](${results[0]?.url || 'N/A'})
              `;

              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: comment
              });
            }
